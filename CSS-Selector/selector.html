<!--Css selector selects element to be styled-->
<!DOCTYPE html>
<html>
    <head>
        <style>
            /*Css element selector*/
            p {
                color:pink;
                text-align:center;
            }
            /*Css-Id selector*/
            #first {
                color:blue;
                text-align:right;
            }
            /*similarly we can even use class selector using .first in style tag*/
        </style>
    </head>
    <body>
        <p>Welcome to my webpage!!</p>
        <p>Good Day</p>
        <p id="first">I am learning CSS</p>
    </body>
</html>
<!--Css-Grouping selector-->
<!--It selects all Html elements on the page-->
<!--It is written inside style tag using *{}-->
